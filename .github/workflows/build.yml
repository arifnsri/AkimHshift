name: Build Python to EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pynput pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --hidden-import=pynput.keyboard._win32 --hidden-import=pynput.mouse._win32 rblxshift.py

    - name: Upload EXE to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Click-to-Shift-EXE
        path: dist/rblxshift.exe
